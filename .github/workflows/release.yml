name: Build wheels

on:
  push:
    tags:
      - "v*"

jobs:
  lint_and_test:
    uses: ./.github/workflows/tests.yml

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs:
      - lint_and_test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install hatch
        run: pip install hatch

      - name: Build sdist
        run: hatch build -t sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: ./dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs:
      - lint_and_test
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-2025
          - windows-11-arm
          - macOS-26

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10 - 3.13"

      - name: Install hatch
        run: pip install hatch

      - name: Build wheels
        run: hatch run wheels:build dist

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./dist/*.whl

  publish_to_pypi:
    name: Publish to PyPI
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    needs:
      - build_sdist
      - build_wheels
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v6
        with:
          path: dist/
          merge-multiple: true
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
